name: Android CI

on: 
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches: 
      - master

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  #6.0.2
      with:
        submodules: recursive
        persist-credentials: false

    - name: set up JDK 11
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  #5.2.0
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  #6.1.0
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  #v5.0.4
      with:
        path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
            ${{ runner.os }}-gradle-
      
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Build with Gradle (Unit tests)
      run: ./gradlew testRelease
    
    - name: Build with Gradle (lintVitalRelease)
      run: ./gradlew lintVitalRelease
    
    - name: Upload artifacts (apk)
      if: success() || failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  #7.0.0
      with:
        name: app
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload artifacts (lint results)
      if: success() || failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  #7.0.0
      with:
        name: lint-results.html
        path: app/build/reports/lint-results.html
